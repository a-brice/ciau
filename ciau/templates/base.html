<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CIAU Architecture{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ static('css/main.css') }}">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#1a1a2e', light: '#16213e', accent: '#e2b97e' }
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-slate-50 font-sans" data-page="{% block page_id %}{% endblock %}">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

<div class="flex h-full">

  <!-- Sidebar -->
  <aside id="sidebar"
         class="fixed inset-y-0 left-0 z-30 w-64 bg-white border-r border-slate-200 flex flex-col
                transform -translate-x-full transition-transform duration-200 ease-in-out
                lg:translate-x-0 lg:static lg:z-auto">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-100">
      <img src="{{ static('img/logo.svg') }}" alt="CIAU" class="h-8 w-8 shrink-0">
      <div class="leading-tight">
        <p class="text-sm font-bold text-slate-900 tracking-wide">CIAU</p>
        <p class="text-xs text-slate-400">Architecture</p>
      </div>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">

      <a href="{{ url('dashboard') }}"
         class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Tableau de bord
      </a>

      <a href="{{ url('project_create') }}"
         class="nav-link {% if request.resolver_match.url_name == 'project_create' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Nouveau projet
      </a>

      <div class="pt-3 pb-1">
        <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Registres</p>
      </div>

      <a href="{{ url('activities_week') }}"
         class="nav-link {% if request.resolver_match.url_name == 'activities_week' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Activités
      </a>

      <a href="{{ url('contracts_list') }}"
         class="nav-link {% if request.resolver_match.url_name == 'contracts_list' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Contrats
      </a>

      <a href="{{ url('archives_list') }}"
         class="nav-link {% if request.resolver_match.url_name == 'archives_list' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
        </svg>
        Archives
      </a>

    </nav>

    <!-- Logout -->
    <div class="px-3 py-4 border-t border-slate-100">
      <a href="{{ url('logout') }}"
         class="nav-link text-slate-500 hover:text-red-600 hover:bg-red-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Déconnexion
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Top bar (mobile) -->
    <header class="lg:hidden flex items-center gap-4 px-4 py-3 bg-white border-b border-slate-200">
      <button onclick="toggleSidebar()" class="p-1.5 rounded text-slate-600 hover:bg-slate-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <span class="text-sm font-semibold text-slate-900">CIAU Architecture</span>
    </header>

    <!-- Flash messages -->
    {% if messages %}
    <div class="px-6 pt-4 space-y-2">
      {% for msg in messages %}
      <div class="flex items-center gap-2 px-4 py-2 rounded text-sm
                  {% if msg.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
                  {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
        {{ msg }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      {% block content %}{% endblock %}
    </main>

  </div>
</div>

<script src="{{ static('js/main.js') }}"></script>
<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('-translate-x-full');
  overlay.classList.toggle('hidden');
}
</script>
</body>
</html>

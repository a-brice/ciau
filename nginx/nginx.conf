server {
    server_name ciau.proctor-iq.com;

    client_max_body_size 10M;

    location /static/ {
        alias /app/static/;
        expires 3d;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ciau.proctor-iq.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ciau.proctor-iq.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = ciau.proctor-iq.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ciau.proctor-iq.com;
    return 404; # managed by Certbot


}